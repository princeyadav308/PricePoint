version: "2"
type: backend
tech_stack:
  - TypeScript
  - Node.js
  - Fastify
  - Prisma
  - PostgreSQL
features:
  - name: Report Management API
    description: Initialize and manage report lifecycle including Dodo payments checkout and status polling
    files:
      - src/routes/reports.ts
      - src/routes/webhooks.ts
      - src/server.ts
    endpoints:
      - method: POST
        path: /api/reports/initialize
        description: Initialize a new report and session
        auth_required: false
      - method: POST
        path: /api/checkout
        description: Create a Dodo payments checkout session
        auth_required: false
      - method: GET
        path: /api/reports/status/:documentId
        description: Poll for payment status
        auth_required: false
      - method: POST
        path: /api/webhooks/dodo
        description: Dodo payments webhook receiver
        auth_required: false
      - method: POST
        path: /api/generate-report
        description: Claude AI report generation
        auth_required: false
    depends_on:
      - Database (Prisma)
      - Dodo Payments API
      - Claude API
known_limitations:
  - issue: Minimal auth required on endpoints
    location: src/server.ts
    impact: Anyone can initialize or generate reports if they have valid payloads
