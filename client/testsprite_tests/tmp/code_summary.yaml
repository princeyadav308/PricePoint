version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React
  - Vite
  - TailwindCSS
  - Zustand
  - ReactFlow
  - Dagre
routes:
  - path: /
    file: src/App.tsx
    auth_required: false
    description: Main application view (Landing and MindMap)
features:
  - name: Landing Page
    description: Initial view to select pricing journey
    files:
      - src/components/LandingView.tsx
      - src/App.tsx
    entry_route: /
    user_interactions:
      - Click "Optimise Existing Product" card
      - Click "Launch New Product" card
    auth_required: false
  - name: Mind Map Visualization
    description: Interactive flow chart for pricing strategy
    files:
      - src/components/MindMap/MindMap.tsx
      - src/store/useMindMapStore.ts
      - src/utils/useAutoLayout.ts
    entry_route: /
    user_interactions:
      - View nodes
      - Expand journey nodes
      - Pan and zoom canvas
    auth_required: false
  - name: Theme Toggle
    description: Switch between light and dark mode
    files:
      - src/components/Layout/Header.tsx
    entry_route: /
    user_interactions:
      - Click theme toggle button
    auth_required: false
known_limitations:
  - issue: State is local only (Zustand), no backend persistence
    location: src/store/useMindMapStore.ts
    impact: Data lost on refresh
